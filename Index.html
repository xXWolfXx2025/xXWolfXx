<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome to xXWOLFXx</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      font-family: Arial, sans-serif;
    }

    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      min-width: 100%;
      min-height: 100%;
      z-index: -1;
      object-fit: cover;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5); /* Dark overlay for better readability */
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .overlay h1 {
      font-size: 3em;
      color: white;
    }

    .overlay p {
      color: #ccc;
      margin-top: 10px;
      font-size: 1.2em;
    }

    .get-started-btn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1em;
      background: crimson;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .get-started-btn:hover {
      background: darkred;
    }
  </style>
</head>
<body>

  <!-- Replace src with your own video later -->
  <video autoplay muted loop class="video-bg">
    <source src="https://cdn.coverr.co/videos/coverr-clouds-time-lapse-9810/1080p.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <div class="overlay">
    <div>
      <h1>Welcome to xXWOLFXx</h1>
      <p>Unleash Your Creative Doubleganger</p>
      <button class="get-started-btn" onclick="location.href='login.html'" aria-label="Get Started">Get Started</button>
    </div>
  </div>

</body>
</html>
