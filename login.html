<!DOCTYPE html>

  <style>
    body {
      background-color: #0f0f0f;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.05);
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 20px #ff0057;
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    .login-container h1 {
      margin-bottom: 20px;
      font-size: 2rem;
    }

    .login-container input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
    }

    .login-container button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 1rem;
      background-color: #ff0057;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .login-container button:hover {
      background-color: #e6004c;
    }

    .divider {
      margin: 20px 0;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Login to xXWOLFXx</h1>

    <!-- Email Login -->
    <input type="email" id="email" placeholder="Email" required />
    <input type="password" id="password" placeholder="Password" required />
    <button onclick="emailLogin()">Login with Email</button>

    <div class="divider">OR</div>

    <!-- Google Login -->
